# Test + coverage gate — see .claude/rules/tdd.md "Coverage gates".
#
# Fails the build when:
#   - any test fails
#   - line / branch / function coverage drops below the thresholds in vitest.config.ts
#
# Pre-commit hooks already run lint + typecheck + gitleaks; this workflow is
# the *test* layer specifically. Local equivalent: `pnpm test:coverage`.

name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Vitest + coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write  # coverage summary comment (future)

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      # Corepack runs first (against the runner's pre-installed Node) so that
      # `cache: 'pnpm'` on setup-node below can locate pnpm to compute the
      # store path. The pnpm shim is a JS file and keeps working after
      # setup-node swaps the Node binary to the .nvmrc-pinned version.
      - name: Activate the pinned pnpm version via corepack
        run: |
          corepack enable
          corepack prepare --activate
          pnpm --version

      - name: Setup Node (pinned via .nvmrc) + pnpm store cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        # vitest.config.ts thresholds (lines / branches / functions / statements)
        # fail the step automatically — no extra gate needed here.
        run: pnpm test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v6.0.0
        with:
          name: coverage
          path: coverage/
          retention-days: 14
          if-no-files-found: warn
